name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup shared package
        run: npm run dev:setup

      - name: Validate monorepo architecture
        run: npm run validate:monorepo

      - name: Lint check
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build all packages
        run: npm run build:all
        env:
          SKIP_ENV_VALIDATION: true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup shared package
        run: npm run dev:setup

      - name: Run tests (web)
        run: npm run test --workspace=packages/web --if-present

      - name: Run tests (shared)
        run: npm run test --workspace=packages/shared --if-present

      - name: Run tests (functions)
        run: npm run test --workspace=functions --if-present